<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <rect x="20" y="20" width="760" height="460" rx="15" fill="#eef0ec" stroke="#c0c0b8" stroke-width="2" />

  <text x="400" y="55" font-family="sans-serif" font-size="18" fill="#444" text-anchor="middle">Git / SSH Access Control Stack</text>

  <rect x="50" y="80" width="700" height="70" rx="8" fill="#fdf0f0" stroke="#d5a5a5" stroke-width="2" />
  <text x="400" y="115" font-family="sans-serif" font-size="16" fill="#602020" text-anchor="middle" font-weight="bold">git / ssh process</text>
  <text x="400" y="135" font-family="sans-serif" font-size="12" fill="#904040" text-anchor="middle">Initiates connection and requests access to cryptographic keys</text>

  <rect x="50" y="170" width="700" height="70" rx="8" fill="#f0f0fd" stroke="#a5a5d5" stroke-width="2" />
  <text x="400" y="205" font-family="sans-serif" font-size="16" fill="#202060" text-anchor="middle" font-weight="bold">AppArmor LSM — mandatory access control</text>
  <text x="400" y="225" font-family="sans-serif" font-size="12" fill="#404090" text-anchor="middle">Profile dictates what the binary is ALLOWED to access (paths, capabilities, network)</text>

  <rect x="50" y="260" width="700" height="70" rx="8" fill="#eef8f0" stroke="#95c5a5" stroke-width="2" />
  <text x="400" y="295" font-family="sans-serif" font-size="16" fill="#206030" text-anchor="middle" font-weight="bold">fanotify daemon — blocking permission events</text>
  <text x="400" y="315" font-family="sans-serif" font-size="12" fill="#409050" text-anchor="middle">Enforces WHO is allowed to access ~/.ssh (inode-verified whitelist)</text>

  <rect x="50" y="350" width="700" height="70" rx="8" fill="#fdfaf0" stroke="#d5c595" stroke-width="2" />
  <text x="400" y="385" font-family="sans-serif" font-size="16" fill="#605020" text-anchor="middle" font-weight="bold">~/.ssh (Protected Target)</text>
  <text x="400" y="405" font-family="sans-serif" font-size="12" fill="#908040" text-anchor="middle">Access granted only if both AppArmor and fanotify checks pass</text>

  <text x="400" y="460" font-family="sans-serif" font-size="12" fill="#888" text-anchor="middle">Top = Initiator · Bottom = Target · Layers complement each other</text>
</svg>
