# ssh-guard configuration
# Reload with: systemctl kill -s HUP ssh-guard
#              or: kill -HUP $(cat /run/ssh-guard.pid)

# --- directories to protect (and all files directly inside them) -------
[watch]
# Add one path per line.  Tilde is NOT expanded --- use absolute paths.
# Replace "alice" with your actual username.
/home/alice/.ssh
/root/.ssh

# --- binaries allowed to open files in the watched directories -------
# Identity is verified by inode, not name --- renaming a binary to "ssh"
# does NOT grant it access.  Add the FULL path of every legitimate binary.
[allow]

# OpenSSH client suite
/usr/bin/ssh
/usr/bin/ssh-agent
/usr/bin/ssh-keygen
/usr/bin/ssh-add
/usr/bin/scp
/usr/bin/sftp

# Git --- uses ssh as a subprocess; git itself may read ~/.ssh/config
/usr/bin/git

# Git internal helpers (spawned by git for remote operations)
/usr/lib/git-core/git-remote-https
/usr/lib/git-core/git-remote-http
/usr/lib/git-core/git

# GPG agent (optional --- needed only if you use GPG for SSH keys)
# /usr/bin/gpg-agent

# FIDO/hardware key helpers (optional --- e.g. YubiKey)
# /usr/lib/openssh/ssh-pkcs11-helper
# /usr/lib/openssh/ssh-sk-helper