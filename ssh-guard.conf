# ssh-guard configuration
# Reload with: systemctl kill -s HUP ssh-guard
#              or: kill -HUP $(cat /run/ssh-guard.pid)

# --- directories to protect (and all files directly inside them) ---------
[watch]
# Add one path per line. Tilde is NOT expanded -- use absolute paths.
# Replace "alice" with your actual username.
/home/alice/.ssh
/root/.ssh

# --- binaries allowed to open files in the watched directories -----------
#
# Identity is verified by inode, not name -- renaming a binary to "ssh"
# does NOT grant it access.
#
# IMPORTANT: git is intentionally NOT in this list.
#
# git has no legitimate need to open files inside ~/.ssh. All SSH
# transport is delegated to the ssh binary below (git execs it as a
# subprocess). If git is added back here, AppArmor's
#   deny @{HOME}/.ssh/** rwklmx
# in usr.bin.git is the only remaining layer -- keeping git off this
# list is what makes the guard robust regardless of key file names.
#
[allow]

# OpenSSH client suite -- the complete, minimal whitelist
/usr/bin/ssh
/usr/bin/ssh-agent
/usr/bin/ssh-keygen
/usr/bin/ssh-add
/usr/bin/scp
/usr/bin/sftp

# FIDO/hardware key helpers (optional -- e.g. YubiKey)
# /usr/lib/openssh/ssh-pkcs11-helper
# /usr/lib/openssh/ssh-sk-helper